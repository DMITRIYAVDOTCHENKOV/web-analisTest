<html lang="ru">
<head>

  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=kW77MZBziDJ19hS9N_c2hyIVmudm1T2KP0XmeUbpWKTlnDiVWatTGn2IpdRxuW7uT8TGdM7V8a3rV0bnH2hNvU-rxaKQDi52vjyAj16mD6J5oXtFwAAmTvczpOWepOdgw-lTSxf8UvUI57Qbktr7zY2BNorG4lW_94Y6BD_BSJ6id55pbKxvDHy6tMCMgllFkjNYKS2imM7CtdRmTqoXe5tNmx-PBJnyxg3401yGLTUtELXh7H5ZZIiR-kR1wtetUT5rjacP0uF1MOkxsbFQfFofgp9C3xQ_XwZizKtSB53ACr_DVR9ZqgvcDZpaBA96" charset="UTF-8"></script><style>
    :root{--dark:#0f172a;--muted:#64748b;--line:#e2e8f0;--accent:#d97706;--green:#22c55e;--light:#f8fafc;--shadow:0 20px 60px rgba(15,23,42,.14)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--light);color:var(--dark)}a{text-decoration:none;color:inherit}button,input,select{font:inherit}.container{width:min(1180px,92vw);margin:auto}.btn{display:inline-flex;justify-content:center;align-items:center;padding:12px 16px;border:0;border-radius:13px;background:var(--accent);color:#fff;font-weight:800;cursor:pointer}.btn.secondary{background:#fff;color:var(--dark);border:1px solid var(--line)}.btn.green{background:var(--green);color:#052e16}header{position:sticky;top:0;background:rgba(15,23,42,.9);backdrop-filter:blur(14px);z-index:50;color:#e5e7eb}.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0}.logo{font-size:22px;font-weight:900}.logo span{color:#f59e0b}.cart-link{position:relative}.cart-badge{position:absolute;top:-9px;right:-9px;background:#ef4444;color:#fff;border-radius:999px;min-width:20px;height:20px;font-size:12px;display:grid;place-items:center;font-weight:800}.hero{padding:48px 0 22px}.hero h1{font-size:clamp(34px,5vw,58px);margin:0 0 10px}.sub{color:var(--muted);line-height:1.55}.toolbar{display:grid;grid-template-columns:1fr 220px 220px;gap:12px;margin:24px 0}.toolbar input,.toolbar select{padding:13px;border:1px solid #cbd5e1;border-radius:14px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding-bottom:70px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 10px 28px rgba(15,23,42,.07);transition:.25s}.card:hover{transform:translateY(-6px);box-shadow:var(--shadow)}.card img{width:100%;height:190px;object-fit:cover}.card-body{padding:16px}.meta{color:var(--muted);font-size:12px;font-weight:800}.price{font-size:24px;font-weight:900;margin:8px 0}.row{display:flex;gap:8px;flex-wrap:wrap}.row .btn{flex:1}.pill{display:inline-block;background:#f1f5f9;color:#475569;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;margin:6px 6px 0 0}details{margin:12px 0;border-top:1px solid var(--line);padding-top:10px}summary{cursor:pointer;font-weight:800}.toast{position:fixed;left:20px;bottom:20px;background:#0f172a;color:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow);z-index:120;display:none}footer{background:#0f172a;color:#cbd5e1;padding:30px 0}.footer-grid{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}@media(max-width:760px){.toolbar{grid-template-columns:1fr}.nav{gap:10px}.hide-mobile{display:none}}
  </style>
</head>
<body>
<header><div class="container nav"><a class="logo" href="index.html">Door<span>Craft</span></a><div style="display:flex;gap:10px;align-items:center"><a class="hide-mobile" href="index.html">Главная</a><a class="btn secondary cart-link" href="cart.html">Корзина <span class="cart-badge" id="cartCount">0</span></a></div></div></header>
<main class="container"><section class="hero"><h1>Полный каталог</h1><p class="sub">Двери, шкафы и мебельные решения. Используйте поиск, фильтры, карточки товаров и корзину.</p><div class="toolbar"><input id="search" placeholder="Поиск по названию или категории"><select id="category"><option value="all">Все категории</option><option>Межкомнатная дверь</option><option>Скрытая дверь</option><option>Входная дверь</option><option>Шкаф</option><option>Мебель</option></select><select id="sort"><option value="default">По умолчанию</option><option value="cheap">Сначала дешевле</option><option value="expensive">Сначала дороже</option></select></div></section><section class="grid" id="grid"></section></main>
<footer><div class="container footer-grid"><div><b style="color:#fff">DoorCraft</b><br>Двери и мебель на заказ</div><div>demo@doorcraft.ru<br>+7 (000) 000-00-00</div><div>© 2026 DoorCraft</div></div></footer><div class="toast" id="toast"></div>
<script>
const imgs=['https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?auto=format&fit=crop&w=900&q=80'];
const names=['Classic Oak','Modern Line','Premium Black','Hidden White','Loft Glass','Soft Grey','Urban Walnut','Family Safe','Royal Veneer','Nordic Door','Entry Strong','Wardrobe Slim','Wardrobe Premium','Kitchen Wood','Hallway Set','Office Panel','Bedroom Calm','Glass Line','Compact Cabinet','Luxury Set'];
const cats=['Межкомнатная дверь','Скрытая дверь','Входная дверь','Шкаф','Мебель'];
const products=names.map((title,i)=>({id:'dc-'+(i+1),title,cat:cats[i%cats.length],price:12900+i*1450,img:imgs[i%imgs.length],desc:'Изделие под заказ с подбором цвета, размера, покрытия и фурнитуры.',tags:['на заказ',i%2?'эмаль':'шпон',i%3?'гарантия':'премиум']}));
const money=n=>new Intl.NumberFormat('ru-RU').format(n)+' ₽';const cart=()=>JSON.parse(localStorage.getItem('doorcraft_cart')||'[]');const saveCart=v=>{localStorage.setItem('doorcraft_cart',JSON.stringify(v));updateCartCount()};function updateCartCount(){document.getElementById('cartCount').textContent=cart().reduce((s,i)=>s+i.qty,0)}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2500)}function addToCart(id){const p=products.find(x=>x.id===id);let c=cart();let item=c.find(x=>x.id===id);item?item.qty++:c.push({...p,qty:1});saveCart(c);toast('Добавлено в корзину')}
function render(){let list=[...products];const q=document.getElementById('search').value.toLowerCase();const cat=document.getElementById('category').value;const sort=document.getElementById('sort').value;if(q)list=list.filter(p=>(p.title+p.cat).toLowerCase().includes(q));if(cat!=='all')list=list.filter(p=>p.cat===cat);if(sort==='cheap')list.sort((a,b)=>a.price-b.price);if(sort==='expensive')list.sort((a,b)=>b.price-a.price);document.getElementById('grid').innerHTML=list.map(p=>`<article class="card"><img src="${p.img}" alt="${p.title}"><div class="card-body"><div class="meta">${p.cat} • ${p.id}</div><h3>${p.title}</h3><div class="price">${money(p.price)}</div>${p.tags.map(t=>`<span class="pill">${t}</span>`).join('')}<details><summary>Описание</summary><p class="sub">${p.desc}</p></details><div class="row"><button class="btn green" onclick="addToCart('${p.id}')">В корзину</button><a class="btn secondary" href="index.html#lead">Заявка</a></div></div></article>`).join('')||'<p>Ничего не найдено.</p>'}
['search','category','sort'].forEach(id=>document.getElementById(id).addEventListener('input',render));render();updateCartCount();
</script></body></html>
