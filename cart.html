ty button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer}.price{font-size:22px;font-weight:900}.total{display:flex;justify-content:space-between;align-items:center;font-size:24px;font-weight:900;border-top:1px solid var(--line);padding-top:16px;margin-top:16px}label{display:block;font-weight:800;margin:12px 0 7px}input,textarea{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:14px}textarea{min-height:100px}.success{display:none;text-align:center;padding:30px}.success.open{display:block}.hidden{display:none}footer{background:#0f172a;color:#cbd5e1;padding:30px 0}@media(max-width:860px){.layout{grid-template-columns:1fr}.item{grid-template-columns:88px 1fr}.item img{width:88px;height:72px}.item .price{grid-column:2}}</style></head><body><header><div class="container nav"><a class="logo" href="index.html">Door<span>Craft</span></a><div style="display:flex;gap:12px"><a href="catalog.html">Каталог</a><a href="index.html">Главная</a></div></div></header><main class="container"><section class="hero"><h1>Корзина</h1><p class="sub">Проверьте товары и отправьте заказ на расчёт.</p></section><section class="layout"><div class="panel"><div id="cartItems"></div><div id="empty" class="sub hidden">Корзина пустая. <a style="color:#d97706;font-weight:800" href="catalog.html">Перейти в каталог</a></div></div><aside class="panel"><div id="orderFields"><h2>Оформление</h2><div class="total"><span>Итого</span><span id="total">0 ₽</span></div><label>Имя</label><input required placeholder="Иван"><label>Телефон</label><input required placeholder="+7 900 000-00-00"><label>Комментарий</label><textarea placeholder="Удобное время для звонка"></textarea><button class="btn green" id="checkout" style="width:100%;margin-top:14px">Отправить заказ</button><button class="btn secondary" id="clear" style="width:100%;margin-top:10px">Очистить корзину</button></div><div class="success" id="success"><h2>Заказ отправлен</h2><p class="sub">Менеджер свяжется с вами для подтверждения деталей.</p><a class="btn" href="catalog.html">Вернуться в каталог</a></div></aside></section></main><footer><div class="container">DoorCraft © 2026</div></footer><script>const money=n=>new Intl.NumberFormat('ru-RU').format(n)+' ₽';const cart=()=>JSON.parse(localStorage.getItem('doorcraft_cart')||'[]');const save=c=>{localStorage.setItem('doorcraft_cart',JSON.stringify(c));render()};function change(id,d){let c=cart();let i=c.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)c=c.filter(x=>x.id!==id);save(c)}function removeItem(id){save(cart().filter(x=>x.id!==id))}function render(){const c=cart();const wrap=document.getElementById('cartItems');document.getElementById('empty').classList.toggle('hidden',c.length>0);wrap.innerHTML=c.map(i=>`<div class="item"><img src="${i.img}" alt="${i.title}"><div><b>${i.title}</b><div class="sub">${i.cat}</div><div class="qty"><button onclick="change('${i.id}',-1)">−</button><span>${i.qty}</span><button onclick="change('${i.id}',1)">+</button><button onclick="removeItem('${i.id}')">Удалить</button></div></div><div class="price">${money(i.price*i.qty)}</div></div>`).join('');document.getElementById('total').textContent=money(c.reduce((s,i)=>s+i.price*i.qty,0))}document.getElementById('clear').onclick=()=>save([]);document.getElementById('checkout').onclick=()=>{if(cart().length===0){alert('Корзина пустая');return}localStorage.removeItem('doorcraft_cart');document.getElementById('orderFields').classList.add('hidden');document.getElementById('success').classList.add('open')};render();</script></body></html>
